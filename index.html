<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Daily Intel</title>
  <style>
    :root {
      --bg: #0b0f17;
      --zebra: #0d1320;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --price: #93c5fd;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      overflow-x: clip;
    }

    .refresh-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.2);
      color: var(--accent);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 20;
      transition: background 120ms ease, transform 150ms ease;
    }

    .refresh-btn:hover:not(:disabled) {
      background: rgba(147, 197, 253, 0.3);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .refresh-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .status {
      padding: 16px 12px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .status.error { color: var(--red); }

    table {
      border-collapse: collapse;
      width: 100%;
      background: var(--bg);
      table-layout: fixed;
    }

    th {
      padding: 12px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }

    th.left { text-align: left; }

    td {
      padding: 14px 12px;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      white-space: nowrap;
    }

    td.ticker {
      text-align: left;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      width: 300px;
      min-width: 300px;
      max-width: 300px;
      white-space: normal;
      vertical-align: middle;
    }

    td.ticker .ru-desc {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
      white-space: normal;
    }

    td.chart {
      width: 340px;
      min-width: 340px;
      padding: 8px 10px;
      vertical-align: middle;
    }

    .chart-frame {
      width: 320px;
      height: 110px;
      border: 0;
      border-radius: 8px;
      display: block;
      background: #111827;
    }

    td.ticker span {
      cursor: help;
    }

    td.ticker a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    td.ticker a:hover {
      text-decoration: underline;
    }

    tbody tr:nth-child(odd) td { background: var(--zebra); }

    .today { color: var(--price); font-weight: 600; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .grey { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <button id="refresh" class="refresh-btn" aria-label="Refresh data" title="Refresh data">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M17.65 6.35A7.95 7.95 0 0012 4V1L7 6l5 5V7a5 5 0 11-4.9 6h-2.02A7 7 0 1017.65 6.35z"/>
        </svg>
      </button>

      <div id="status" class="status">No data yet. Click the refresh icon to fetch data.</div>

      <table id="table" style="display:none;">
        <colgroup>
          <col>
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:100px">
          <col style="width:340px">
        </colgroup>
        <thead>
          <tr>
            <th class="left">Тикер</th>
            <th>Вчера</th>
            <th>Сегодня</th>
            <th>Изм.</th>
            <th>Изм. %</th>
            <th>Неделя %</th>
            <th>MTD %</th>
            <th>YTD %</th>
            <th class="left">График D</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const btn = document.getElementById('refresh');
    const status = document.getElementById('status');
    const table = document.getElementById('table');
    const tbody = document.getElementById('tbody');
    const CACHE_KEY = 'weekly-market-report-cache-v1';
    const BASE_BTN_TITLE = 'Refresh data';

    function fmtPrice(v) {
      if (v >= 10000) return v.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtChg(v) {
      const sign = v >= 0 ? '+' : '';
      if (Math.abs(v) >= 1000) return sign + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return sign + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(v) {
      const sign = v >= 0 ? '+' : '';
      return sign + v.toFixed(2) + '%';
    }

    function cls(v) {
      if (v > 0.001) return 'green';
      if (v < -0.001) return 'red';
      return 'grey';
    }

    const RU_DESC = {
      SPY: 'ETF на индекс S&P 500 — 500 крупнейших публичных компаний США. Главный бенчмарк широкого рынка: задаёт настроение по большим капитализациям и общий риск-аппетит.',
      QQQ: 'ETF на Nasdaq-100 — 100 крупнейших нефинансовых компаний биржи Nasdaq, доминируют технологии (AAPL, MSFT, NVDA). Ростовой и более волатильный аналог SPY; чувствителен к ставкам и ИИ-теме.',
      IWM: 'ETF на Russell 2000 — индекс из ~2000 малых компаний США. Классический индикатор риск-аппетита и здоровья внутренней экономики: при оптимизме обгоняет крупные капиталы.',
      SMH: 'ETF на крупнейшие полупроводниковые компании (NVIDIA, TSMC, ASML, AMD и др.). Главный барометр ИИ-цикла и глобального капекса в технологии; высокая бета к рынку.',
      XBI: 'Равновзвешенный ETF на биотех S&P. Малый и средний биотех — высоковолатильный сегмент, отражает риск-аппетит в здравоохранении и спекулятивный спрос.',
      DIA: 'ETF на Dow Jones Industrial Average — 30 крупнейших промышленных и финансовых "голубых фишек" США. Более защитный и медленный срез рынка, чем SPY.',
      XLF: 'ETF на финансовый сектор S&P 500 — банки, страховщики, биржи, управляющие компании. Чувствителен к кривой доходностей и кредитному циклу.',
      TLT: 'ETF на длинные казначейские облигации США (срок 20+ лет). Растёт при падении долгих доходностей; индикатор ожиданий по ставкам и риск-офф настроениям.',
      XLE: 'ETF на энергетический сектор S&P 500 — нефтегазовые мейджоры, переработчики, нефтесервис. Зависит от цены на нефть и геополитики.',
      XLK: 'ETF на технологический сектор S&P 500 — софт, железо, полупроводники (AAPL, MSFT, NVDA). Главный драйвер роста индекса последних лет.',
      'CL1!': 'Фьючерс на нефть WTI — ближний контракт. Глобальный макроиндикатор инфляции, спроса и геополитического риска.',
      BTC: 'Bitcoin к доллару США. Крупнейшая криптовалюта; высоковолатильный риск-актив, реагирует на ликвидность, ставки и общий риск-аппетит.',
      ETH: 'Ethereum к доллару США. Крупнейший альткоин и основа DeFi/смарт-контрактов; чувствителен к активности экосистемы и общему крипто-настроению.'
    };

    const TV_SYMBOL = {
      SPY: 'AMEX:SPY',
      QQQ: 'NASDAQ:QQQ',
      IWM: 'AMEX:IWM',
      SMH: 'NASDAQ:SMH',
      XBI: 'AMEX:XBI',
      DIA: 'AMEX:DIA',
      XLF: 'AMEX:XLF',
      TLT: 'NASDAQ:TLT',
      XLE: 'AMEX:XLE',
      XLK: 'AMEX:XLK',
      'CL1!': 'TVC:USOIL',
      BTC: 'BITSTAMP:BTCUSD',
      ETH: 'BITSTAMP:ETHUSD'
    };

    function getRuDescription(row) {
      return RU_DESC[row.symbol] || `${row.name}: ${row.desc}`;
    }

    function getTvSymbol(row) {
      return TV_SYMBOL[row.symbol] || row.symbol;
    }

    function tradingViewSrc(row) {
      const config = {
        symbol: getTvSymbol(row),
        width: '100%',
        height: '100%',
        locale: 'en',
        dateRange: '12M',
        colorTheme: 'dark',
        isTransparent: true,
        autosize: true,
        largeChartUrl: '',
        noTimeScale: false,
        chartOnly: true,
        trendLineColor: 'rgba(96, 165, 250, 1)',
        underLineColor: 'rgba(96, 165, 250, 0.3)',
        underLineBottomColor: 'rgba(96, 165, 250, 0)'
      };
      return `https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${encodeURIComponent(JSON.stringify(config))}`;
    }

    function render(data) {
      tbody.innerHTML = '';
      data.rows.forEach((r) => {
        const tooltip = `${r.name} - ${r.desc}`.replace(/"/g, '&quot;');
        const ruDesc = getRuDescription(r).replace(/"/g, '&quot;');

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="ticker">
            <a href="https://www.tradingview.com/chart/?symbol=${encodeURIComponent(getTvSymbol(r))}" target="_blank" rel="noopener noreferrer" title="${tooltip}">${r.symbol}</a>
            <span class="ru-desc">${ruDesc}</span>
          </td>
          <td>${fmtPrice(r.yest)}</td>
          <td class="today">${fmtPrice(r.today)}</td>
          <td class="${cls(r.chg)}">${fmtChg(r.chg)}</td>
          <td class="${cls(r.chg_pct)}">${fmtPct(r.chg_pct)}</td>
          <td class="${cls(r.wk_pct)}" style="font-weight:600;">${fmtPct(r.wk_pct)}</td>
          <td class="${cls(r.mtd_pct)}">${fmtPct(r.mtd_pct)}</td>
          <td class="${cls(r.ytd_pct)}">${fmtPct(r.ytd_pct)}</td>
          <td class="chart">
            <iframe class="chart-frame" title="${r.symbol} TradingView daily chart" loading="lazy" src="${tradingViewSrc(r)}"></iframe>
          </td>
        `;

        tbody.appendChild(tr);
      });
      table.style.display = '';
      status.className = 'status';
      const asOf = data.as_of ? `as of ${data.as_of}` : 'as of latest response';
      const basisHint = data.rows && data.rows.some((r) => r.price_basis === 'live')
        ? 'Today uses live quote when available.'
        : 'Today reflects latest close.';
      status.textContent = `Live data loaded (${asOf}). ${basisHint}`;
      status.style.display = 'none';
      btn.title = status.textContent;
    }

    function saveCache(data) {
      if (!data || data.source !== 'live') return;
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ saved_at: Date.now(), data }));
      } catch {
        // Keep app usable if storage is blocked.
      }
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.data || !Array.isArray(parsed.data.rows)) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    async function refresh() {
      btn.disabled = true;
      btn.style.transform = 'rotate(180deg)';
      btn.title = 'Refreshing data...';
      status.className = 'status';
      status.style.display = '';
      status.textContent = 'Fetching data from Yahoo Finance...';
      table.style.display = 'none';

      try {
        const res = await fetch('/api/data');
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        if (data.source !== 'live') {
          throw new Error('Server did not return live data.');
        }
        render(data);
        saveCache(data);
      } catch (e) {
        status.className = 'status error';
        status.textContent = `Failed to load: ${e.message}`;
        btn.title = BASE_BTN_TITLE;
      } finally {
        btn.disabled = false;
        btn.style.transform = 'rotate(0deg)';
      }
    }

    btn.addEventListener('click', refresh);

    // On reload, show cached data only. Fresh fetch happens only on button click.
    const cached = loadCache();
    if (cached) {
      render(cached.data);
      const savedAt = new Date(cached.saved_at).toLocaleString();
      btn.title = `Showing saved data from ${savedAt}. Click refresh to fetch live data.`;
      status.style.display = 'none';
    } else {
      btn.title = BASE_BTN_TITLE;
      status.style.display = 'none';
    }
  </script>
</body>
</html>
