services:
  trading-station:
    build: .
    # OPENAI_API_KEY (and any OPENAI_MODEL override) is read at runtime by the
    # Next.js standalone server. The .env file is gitignored and not baked into
    # the image, so pass it in here.
    env_file:
      - .env
    ports:
      - "8888:8888"
    volumes:
      # Blotter journal (blotter.json) lives at this real host path, bind-mounted
      # into the container. Mount the directory (not the file) so store.ts's
      # atomic temp-file + rename write keeps working.
      - "C:\\Users\\Ros\\Dropbox\\TradeStation:/app/data"
    restart: unless-stopped
